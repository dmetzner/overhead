name: Pack extension

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: manifest
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          zip -r "nice-header-v${{ steps.manifest.outputs.version }}.zip" \
            manifest.json sw.js rules.js popup.html popup.js popup.css icons \
            -x "*.DS_Store"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nice-header-v${{ steps.manifest.outputs.version }}
          path: nice-header-v${{ steps.manifest.outputs.version }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nice-header-v${{ steps.manifest.outputs.version }}.zip
