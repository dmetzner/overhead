name: Pack extension

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: manifest
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match manifest.json version ${{ steps.manifest.outputs.version }}"
            exit 1
          fi

      # Two builds: the committed manifest is Chrome-canonical (background.service_worker).
      # Firefox has no service_worker support (bug 1573659) and uses an event page, so the
      # Firefox build swaps background to the scripts form — each browser loads warning-free.
      - name: Build zips
        env:
          V: ${{ steps.manifest.outputs.version }}
        run: |
          shared="sw.js rules.js share.js standard-headers.js popup.html popup popup.css icons"

          # Chrome — manifest as committed
          zip -r "overhead-chrome-v${V}.zip" manifest.json $shared -x "*.DS_Store"

          # Firefox — inject background.scripts (drop service_worker)
          mkdir -p ff && cp -r $shared ff/
          jq '.background = {"scripts": ["sw.js"], "type": "module"}' manifest.json > ff/manifest.json
          (cd ff && zip -r "../overhead-firefox-v${V}.zip" . -x "*.DS_Store")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: overhead-v${{ steps.manifest.outputs.version }}
          path: overhead-*-v${{ steps.manifest.outputs.version }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: overhead-*-v${{ steps.manifest.outputs.version }}.zip
